# =============================================================
#  CETEM Market Intelligence - configuracao nginx
#  Salvar em: /etc/nginx/sites-available/cetem
#  Trocar SEU_DOMINIO.com.br pelo seu dominio real.
# =============================================================

server {
    listen 80;
    listen [::]:80;

    server_name SEU_DOMINIO.com.br www.SEU_DOMINIO.com.br;

    # Arquivos estaticos do build do frontend (Vite -> dist/)
    root /var/www/cetem-market-intelligence/dist;
    index index.html;

    # Tamanho maximo de requisicao (buscas etc.)
    client_max_body_size 5m;

    # API -> backend FastAPI rodando em 127.0.0.1:8000
    # Requests para /api/... sao encaminhados ao FastAPI mantendo o caminho.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Cache agressivo para assets versionados do Vite (nome com hash)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
